# Phase 1: Catcher + client container for prototype
# Run: ./scripts/container-compose.sh up -d --build  (Podman or Docker)
#
# Clients: 'client' (metadata-only) and 'restic-client' (real restic backup to MinIO).
# Run both, or choose one: docker compose up client restic-client
services:
  catcher:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  minio:
    image: docker.io/minio/minio:latest
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data

  client:
    build:
      context: ./clients
      dockerfile: docker-client/Dockerfile
    environment:
      - CATCHER_URL=http://catcher:8000
      - WATCH_DIR=/data
    volumes:
      - ./tests/fixtures/mock-data:/data:ro
    depends_on:
      - catcher

  restic-client:
    build: ./clients/restic-client
    environment:
      - CATCHER_URL=http://catcher:8000
      - RESTIC_REPOSITORY=s3:http://minio:9000/restic
      - RESTIC_PASSWORD=restic-demo
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - WATCH_DIR=/data
      - BACKUP_INTERVAL=60
    volumes:
      - ./tests/fixtures/mock-data:/data:ro
    depends_on:
      - catcher
      - minio

  dashboard:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_API=http://catcher:8000
    depends_on:
      - catcher

volumes:
  minio-data:
