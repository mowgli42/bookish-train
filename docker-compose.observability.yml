# Optional observability stack for local SigNoz-style OTLP ingestion.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Point services at the collector:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
#   OTEL_SERVICE_NAME=edge-backup-catcher|edge-backup-client
#   EBK_LOG_FORMAT=json
#   EBK_AI_STATUS=1
#
# For hosted SigNoz Cloud, set OTEL_EXPORTER_OTLP_ENDPOINT and headers per your tenant.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docs/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    profiles:
      - observability

  catcher:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=edge-backup-catcher
      - EBK_LOG_FORMAT=json
      - EBK_AI_STATUS=0
      - LOG_LEVEL=INFO
    profiles:
      - observability

  client:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=edge-backup-client
      - EBK_LOG_FORMAT=json
      - EBK_AI_STATUS=1
      - EBK_AI_STATUS_STREAM=stdout
    profiles:
      - observability
