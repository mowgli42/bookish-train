name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest requests rich -r backend/requirements.txt
      - name: Unit tests
        run: pytest tests/unit -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest fastapi httpx -r backend/requirements.txt
      - name: Integration tests
        run: pytest tests/integration -q
